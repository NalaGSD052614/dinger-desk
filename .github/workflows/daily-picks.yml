name: Generate Daily Picks

on:
  schedule:
    # Off-the-hour times to dodge GitHub Actions scheduler delays
    # All times UTC, mapped to CDT (UTC-5):
    #   16:17 UTC = 11:17 AM Central  (first read, lands by noon)
    #   19:23 UTC = 2:23 PM Central   (primary run, lands by 3 PM)
    #   21:37 UTC = 4:37 PM Central   (evening safety refresh)
    - cron: '17 16 * * *'
    - cron: '23 19 * * *'
    - cron: '37 21 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/generate_picks.py

     - name: Commit and push if changed
        run: |
          git config user.name "Dinger Desk Bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add data/picks.json data/results.json data/graded_picks.json data/history/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily update $(date -u +%Y-%m-%d)"
            git push
          fi
